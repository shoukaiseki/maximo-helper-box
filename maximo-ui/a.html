<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>询价单模板</title>
    <style>
        /* IBM Plex Sans 字体 */
        @font-face {
            font-family: 'MaximoBase';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff") format("woff");
            font-weight: 400;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'MaximoBase-Bold';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff") format("woff");
            font-weight: 600;
            font-style: normal;
        }

        body { 
            font-family: 'MaximoBase', "Segoe UI", "Microsoft YaHei", Arial, sans-serif; 
            background: #f5f5f5; 
            margin: 0;
            padding: 20px;
            color: #161616;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
        }

        /* 折叠面板 */
        .section-box {
            margin-bottom: 20px;
            border: 1px solid #E0E0E0;
            background: #ffffff;
        }

        .section-header {
            background: #F4F4F4;
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: #E8E8E8;
        }

        .section-header .icon {
            margin-right: 8px;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .section-header.collapsed .icon {
            transform: rotate(-90deg);
        }

        .section-title {
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #161616;
            flex: 1;
        }

        .section-content {
            padding: 20px;
            border-top: 1px solid #E0E0E0;
        }

        .section-content.collapsed {
            display: none;
        }

        /* 表单布局 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px 24px;
        }

        .form-item {
            display: flex;
            align-items: center;
        }

        .form-label {
            width: 100px;
            text-align: right;
            margin-right: 12px;
            color: #525252;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .form-label.required::before {
            content: '* ';
            color: #DA1E28;
        }

        .form-input, .form-select {
            flex: 1;
            border: 0px;
            border-bottom: 1px solid #8D8D8D;
            border-radius: 0px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: 'MaximoBase', Arial, sans-serif;
            color: #000000;
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-select:focus {
            border-bottom-color: #0F62FE;
            outline: 2px solid #0F62FE;
            outline-offset: -2px;
        }

        .form-select {
            appearance: none;
            -webkit-appearance: none;
            background: url("data:image/svg+xml;charset=UTF-8,<svg height='20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 8l5 5 5-5z' fill='%230F62FE'/></svg>") no-repeat right 10px center/16px 16px;
            cursor: pointer;
        }

        .form-input.readonly {
            background-color: #F4F4F4;
            border-bottom-color: #E0E0E0;
            color: #525252;
        }

        /* 附件按钮 */
        .attachment-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #0F62FE;
            background: #ffffff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .attachment-btn:hover {
            background: #0F62FE;
            color: #ffffff;
        }

        /* 子标题 */
        .subsection-title {
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #161616;
            margin: 20px 0 12px 0;
        }

        /* 表格样式 */
        .mx-table { 
            border-collapse: collapse; 
            width: 100%; 
            background: #fff; 
            margin-top: 10px;
        }

        .mx-table th, .mx-table td { 
            text-align: left; 
            border: 1px solid #E0E0E0;
            padding: 10px 12px;
            font-size: 13px;
        }

        .mx-table th { 
            background: #F4F4F4; 
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-weight: 600;
            color: #161616;
            font-size: 13px;
            white-space: nowrap;
        }

        .mx-table td[numeric] {
            text-align: right;
        }

        .mx-table td[center] {
            text-align: center;
        }

        .mx-table tr:nth-child(even) {
            background-color: #FAFAFA;
        }

        .mx-table tr:hover { 
            background: #E5F6FF;
        }

        .mx-table input {
            width: 100%;
            border: 0px;
            padding: 4px 8px;
            font-size: 13px;
            font-family: 'MaximoBase', Arial, sans-serif;
            outline: none;
            background: transparent;
        }

        .mx-table input:focus {
            border-bottom: 1px solid #0F62FE;
            outline: 2px solid #0F62FE;
            outline-offset: -2px;
        }

        /* 按钮样式 */
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        .mx-button { 
            padding: 8px 24px; 
            border: 1px solid #0F62FE; 
            border-radius: 4px; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s;
            font-family: 'MaximoBase', Arial, sans-serif;
        }

        .mx-primary { 
            background: #0F62FE; 
            color: #ffffff;
            border-color: #0F62FE;
        }

        .mx-primary:hover { 
            background: #0353E9;
            border-color: #0353E9;
        }

        .mx-secondary { 
            background: #ffffff; 
            color: #0F62FE;
            border-color: #0F62FE;
        }

        .mx-secondary:hover { 
            background: #E5F6FF;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-label {
                width: auto;
                text-align: left;
                margin-right: 0;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 模板基本信息 -->
        <div class="section-box">
            <div class="section-header" onclick="toggleSection(this)">
                <span class="icon">▼</span>
                <span class="section-title">模板基本信息</span>
            </div>
            <div class="section-content">
                <div class="form-grid">
                    <div class="form-item">
                        <label class="form-label">模板编号:</label>
                        <input class="form-input" type="text" value="t001" readonly>
                    </div>
                    <div class="form-item">
                        <label class="form-label">描述:</label>
                        <input class="form-input" type="text" value="用于零件采购询价的标准模板">
                    </div>
                    <div class="form-item">
                        <label class="form-label">创建人:</label>
                        <input class="form-input readonly" type="text" value="Zhihua Wang" readonly>
                    </div>

                    <div class="form-item">
                        <label class="form-label required">模板名称:</label>
                        <input class="form-input" type="text" value="标准出口询价单模板">
                    </div>
                    <div class="form-item">
                        <label class="form-label">状态:</label>
                        <select class="form-select">
                            <option value="active" selected>活动</option>
                            <option value="inactive">停用</option>
                            <option value="draft">草稿</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">创建时间:</label>
                        <input class="form-input readonly" type="text" value="2025-05-22 10:30:00" readonly>
                    </div>

                    <div class="form-item">
                        <label class="form-label">模板类型:</label>
                        <select class="form-select">
                            <option value="part" selected>零件</option>
                            <option value="material">材料</option>
                            <option value="service">服务</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">最后更新:</label>
                        <input class="form-input readonly" type="text" value="2025-05-22 10:30:00" readonly>
                    </div>
                    <div class="form-item">
                        <label class="form-label">附件:</label>
                        <button class="attachment-btn" title="添加附件">📎</button>
                    </div>

                    <div class="form-item">
                        <label class="form-label">适用业务类型:</label>
                        <input class="form-input readonly" type="text" value="零件采购" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- 零件模板明细 -->
        <div class="section-box">
            <div class="section-header" onclick="toggleSection(this)">
                <span class="icon">▼</span>
                <span class="section-title">零件模板明细</span>
            </div>
            <div class="section-content">
                <!-- 费用项目明细 -->
                <div class="subsection-title">费用项目明细</div>
                <table class="mx-table">
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">序号</th>
                            <th>费用项目</th>
                            <th style="width: 150px;">目标值</th>
                            <th style="width: 120px; text-align: center;">是否必填</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td center>1</td>
                            <td>材料费</td>
                            <td numeric>100</td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>2</td>
                            <td>加工费</td>
                            <td numeric>20</td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>3</td>
                            <td>外协件</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>4</td>
                            <td>管理费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>5</td>
                            <td>包装费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>6</td>
                            <td>运费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>7</td>
                            <td>模具费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>8</td>
                            <td>工装夹具</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>9</td>
                            <td>设备费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>10</td>
                            <td>开发费</td>
                            <td></td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                    </tbody>
                </table>

                <!-- 询价单字段配置 -->
                <div class="subsection-title">询价单字段配置</div>
                <table class="mx-table">
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">序号</th>
                            <th>字段名称</th>
                            <th style="width: 120px; text-align: center;">是否必填</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td center>1</td>
                            <td>阶梯</td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>2</td>
                            <td>式样条件</td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>3</td>
                            <td>技术交流结果</td>
                            <td center>否</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>4</td>
                            <td>本位币</td>
                            <td center>是</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                        <tr>
                            <td center>5</td>
                            <td>材质</td>
                            <td center>是</td>
                            <td><input type="text" placeholder="请输入备注"></td>
                        </tr>
                    </tbody>
                </table>

                <!-- 底部按钮 -->
                <div class="button-group">
                    <button class="mx-button mx-primary">新增行</button>
                    <button class="mx-button mx-secondary">导入模板</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 折叠面板切换
        function toggleSection(header) {
            header.classList.toggle('collapsed');
            const content = header.nextElementSibling;
            content.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
