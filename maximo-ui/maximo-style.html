<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>Maximo 9 组件演示</title>
    <style>
        /* IBM Plex Sans 字体 */
        @font-face {
            font-family: 'MaximoBase';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff") format("woff");
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'MaximoBase-Bold';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff") format("woff");
            font-weight: 600;
            font-style: normal;
        }

        body         {
            font-family: 'MaximoBase', "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: #f1f1f1;
            margin: 30px;
            color: #161616;
        }
        .section      { margin-bottom: 40px;}
        .section-title{
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0 18px;
            color: #161616;
        }
        .mx-label     {
            display:inline-block;
            width:100px;
            text-align:right;
            margin-right:10px;
            color: #464646;
            font-size: 13px;
        }
        .mx-input, .mx-select, .mx-textarea {
            border: 0px;
            border-bottom: 1px solid #8D8D8D;
            border-radius: 0px;
            padding: 8px 16px;
            min-width:220px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: 'MaximoBase', Arial, sans-serif;
            color: #000000;
            background-color: #ffffff;
        }
        .mx-input:focus, .mx-select:focus, .mx-textarea:focus { 
            border-bottom-color: #0F62FE;
            outline: 2px solid #0F62FE;
            outline-offset: -2px;
        }
        .mx-input:read-only, .mx-select:disabled, .mx-textarea:read-only {
            background-color: #F4F4F4;
            color: #666666;
            cursor: not-allowed;
        }
        .required::before {
            content: "*";
            color: #DA1E28;
            margin-right: 4px;
        }
        .mx-textarea   {
            height: 60px;
            width: 350px;
            resize: vertical;
            border: 1px solid #8D8D8D;
        }
        .mx-partinput  { display:flex; align-items:center; gap:8px;}
        .mx-partinput input { min-width: 75px;}
        .mx-button   {
            padding: calc(0.875rem - 3px) 63px calc(0.875rem - 3px) 15px;
            border: 1px solid #0F62FE;
            border-radius: 0px;
            font-size: 14px;
            margin: 2px 16px 2px 0;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 70px;
            position: relative;
        }
        .mx-primary  {
            background: #0F62FE;
            color: #ffffff;
            border-color: #0F62FE;
        }
        .mx-primary:hover {
            background: #0353E9;
            border-color: #0353E9;
        }
        .mx-secondary{
            background: #ffffff;
            color: #0F62FE;
            border-color: #0F62FE;
        }
        .mx-secondary:hover {
            background: #0F62FE;
            color: #ffffff;
        }
        .mx-radio input { margin-right: 6px;}
        .mx-table      {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .mx-table th, .mx-table td {
            text-align: left;
            border: 0px;
            border-bottom: 1px solid #E0E0E0;
            padding: 10px 15px;
        }
        .mx-table th   {
            background: #E0E0E0;
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-weight: bold;
            color: #444444;
            font-size: 13px;
        }
        .mx-table tr:nth-child(even) {
            background-color: #FAFAFA;
        }
        .mx-table tr:hover    {
            background: #f4f4f4;
        }
        /* 选项卡 */
        .mx-tabs       {
            display: flex;
            border-bottom: 2px solid #E0E0E0;
        }
        .mx-tab        {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 0px;
            background: #ffffff;
            margin-right: 2px;
            font-size: 13px;
            color: #464646;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .mx-tab.active {
            background: #ffffff;
            border-bottom: 2px solid #0F62FE;
            color: #0F62FE;
            font-weight: 600;
        }
        .mx-tab:hover:not(.active) {
            background: #f4f4f4;
        }
        .mx-tab-content{
            background: #fff;
            border: 1px solid #E0E0E0;
            border-top: none;
            padding: 18px 10px 10px 20px;
            margin-top: 0px;
        }
        /* 下拉箭头 */
        .mx-select {
            appearance: none;
            -webkit-appearance: none;
            background: url("data:image/svg+xml;charset=UTF-8,<svg height='20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 8l5 5 5-5z' fill='%230F62FE'/></svg>") no-repeat right 10px center/16px 16px;
        }
        /* 美化对话框 */
        #dialog-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(22, 22, 22, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .mx-dialog {
            min-width: 340px;
            max-width: 440px;
            background: #fff;
            border-radius: 0px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            padding: 0 0 18px 0;
            overflow: hidden;
            position: relative;
            animation: dialog-fade-in 0.18s;
        }
        @keyframes dialog-fade-in {
            from { transform: translateY(60px) scale(1.04); opacity: 0;}
            to   { transform: none; opacity: 1;}
        }
        .mx-dialog-title {
            background: #ffffff;
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            padding: 18px 20px 12px 26px;
            border-bottom: 1px solid #E0E0E0;
            letter-spacing: 0.5px;
            color: #161616;
        }
        .mx-dialog-content {
            padding: 18px 24px 8px 26px;
            font-size: 14px;
            color: #161616;
        }
        .mx-dialog-actions {
            text-align: right;
            padding: 0 22px;
            margin-top: 14px;
        }
        .mx-close {
            position: absolute;
            right: 16px;
            top: 10px;
            font-size: 22px;
            color: #8D8D8D;
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            line-height: 1.5;
            transition: color .18s;
        }
        .mx-close:hover {
            color: #0F62FE;
        }
    </style>
</head>
<body>
<div class="section">
    <div class="section-title">1. 按钮 Button</div>
    <button type="button" class="mx-button mx-primary" onclick="openDialog()">保存</button>
    <button type="button" class="mx-button mx-secondary">取消</button>
</div>

<div class="section">
    <div class="section-title">2. 对话框 Dialog</div>
    <!-- 点击保存按钮显示对话框 -->
    <button class="mx-button mx-primary" onclick="openDialog()">弹出对话框</button>
    <div id="dialog-bg">
        <div class="mx-dialog">
            <div class="mx-dialog-title">
                操作确认
                <button class="mx-close" onclick="closeDialog()" title="关闭">&#10005;</button>
            </div>
            <div class="mx-dialog-content">
                是否确认保存本次修改？
            </div>
            <div class="mx-dialog-actions">
                <button class="mx-button mx-primary" onclick="closeDialog()">确定</button>
                <button class="mx-button mx-secondary" onclick="closeDialog()">取消</button>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-title">3. 单选框 Radio Button</div>
    <label class="mx-radio">
        <input type="radio" name="asset_status" value="active" checked>
        启用
    </label>
    <label class="mx-radio">
        <input type="radio" name="asset_status" value="inactive">
        停用
    </label>
</div>
<div class="section">
    <div class="section-title">4. 表格 Table</div>
    <table class="mx-table">
        <thead>
        <tr>
            <th>资产编号</th>
            <th>资产名称</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1001</td>
            <td>锅炉泵</td>
            <td>启用</td>
            <td>
                <button class="mx-button mx-secondary">编辑</button>
            </td>
        </tr>
        <tr>
            <td>1002</td>
            <td>空调机组</td>
            <td>停用</td>
            <td>
                <button class="mx-button mx-secondary">编辑</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div class="section">
    <div class="section-title">5. 单行文本框</div>
    <p style="color: #666; font-size: 13px; margin-bottom: 15px;">最常用的字段值显示组件, 用于显示字段值，可设置字段的标题和描述。</p>
    <label class="mx-label" for="assetnum">资产编号</label>
    <input class="mx-input" id="assetnum" type="text" placeholder="请输入资产编号"><br>
    
    <label class="mx-label required" for="assetnum2">资产编号(必填)</label>
    <input class="mx-input" id="assetnum2" type="text" placeholder="请输入资产编号"><br>
    
    <label class="mx-label" for="assetnum3">资产编号(只读)</label>
    <input class="mx-input" id="assetnum3" type="text" value="ASSET-001" readonly><br>
</div>
<div class="section">
    <div class="section-title">6. 多行文本框</div>
    <label class="mx-label" for="description">资产描述</label>
    <textarea class="mx-textarea" id="description" placeholder="请输入详细描述"></textarea>
</div>
<div class="section">
    <div class="section-title">7. 多部分文本框 (如区间字段)</div>
    <label class="mx-label">温度范围</label>
    <div class="mx-partinput">
        <input class="mx-input" type="text" placeholder="最低温度">
        <span>~</span>
        <input class="mx-input" type="text" placeholder="最高温度">
        <span>°C</span>
    </div>
</div>
<div class="section">
    <div class="section-title">8. 组合框（下拉选择 ComboBox）</div>
    <label class="mx-label" for="location">资产位置</label>
    <select class="mx-select" id="location">
        <option value="">请选择位置</option>
        <option value="warehouse">仓库</option>
        <option value="plant">工厂</option>
        <option value="office">办公区</option>
    </select>
</div>
<div class="section">
    <div class="section-title">9. 选项卡组（Tab Group）</div>
    <div class="mx-tabs">
        <div class="mx-tab active" onclick="showTab(0)">资产信息</div>
        <div class="mx-tab" onclick="showTab(1)">维修信息</div>
        <div class="mx-tab" onclick="showTab(2)">历史记录</div>
    </div>
    <div id="tab-contents">
        <div class="mx-tab-content" style="display:block;">
            这里显示资产信息内容。
        </div>
        <div class="mx-tab-content" style="display:none;">
            这里显示维修信息内容。
        </div>
        <div class="mx-tab-content" style="display:none;">
            这里显示历史记录内容。
        </div>
    </div>
</div>
<script>
    function openDialog() {
        // 用flex实现遮罩和居中
        document.getElementById('dialog-bg').style.display = 'flex';
    }
    function closeDialog() {
        document.getElementById('dialog-bg').style.display = 'none';
    }
    // tabs 切换脚本
    function showTab(idx) {
        var tabs = document.querySelectorAll('.mx-tab');
        var conts = document.querySelectorAll('.mx-tab-content');
        tabs.forEach((tab,i)=>tab.classList.toggle('active',i===idx));
        conts.forEach((c,i)=>c.style.display=i===idx?'block':'none');
    }
</script>
</body>
</html>
