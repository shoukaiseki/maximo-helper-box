<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>Maximo 9 组件演示</title>
    <style>
        body         { font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: #f9f9fc; margin: 30px;}
        .section      { margin-bottom: 40px;}
        .section-title{ font-size:20px; font-weight:bold; margin:10px 0 18px;}
        .mx-label     { display:inline-block; width:100px; text-align:right; margin-right:10px; color:#333;}
        .mx-input, .mx-select, .mx-textarea { border:1px solid #d0d4e6; border-radius:3px; padding:6px 8px; min-width:220px; font-size:14px; margin-bottom:10px;}
        .mx-input:focus, .mx-select:focus, .mx-textarea:focus { border-color:#2076d3; outline: none;}
        .mx-textarea   { height:60px; width:350px; resize:vertical;}
        .mx-partinput  { display:flex; align-items:center; gap:8px;}
        .mx-partinput input { min-width: 75px;}
        .mx-button   { padding: 6px 24px; border: none; border-radius: 3px; font-size: 14px; margin: 0 8px 0 0; cursor:pointer; transition:background .2s;}
        .mx-primary  { background: #2076d3; color: #fff;}
        .mx-primary:hover { background: #1457a8;}
        .mx-secondary{ background: #f4f4f4; color: #424242;}
        .mx-secondary:hover { background: #e0e0e0;}
        .mx-radio input { margin-right: 6px;}
        .mx-table      { border-collapse:collapse; width:100%; background:#fff; box-shadow:0 0 10px #e1e6ec;}
        .mx-table th, .mx-table td { text-align: center; border:1px solid #e3e6f0;}
        .mx-table th   { background: #f2f7fc; font-weight:bold;}
        .mx-table tr:hover    { background: #f2f2fa;}
        /* 选项卡 */
        .mx-tabs       { display:flex; border-bottom:2px solid #e0e2e6;}
        .mx-tab        { padding:10px 24px; cursor:pointer; border-radius:8px 8px 0 0; background:#eceef5; margin-right:2px;}
        .mx-tab.active { background:#fff; border-bottom:2px solid #2076d3; color:#2076d3;}
        .mx-tab-content{ background:#fff; border:1px solid #e0e2e6; padding:18px 10px 10px 20px; margin-top:-1px;}
        /* 下拉箭头 */
        .mx-select { appearance: none; -webkit-appearance: none; background: url("data:image/svg+xml;charset=UTF-8,<svg height='20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 8l5 5 5-5z' fill='%232076d3'/></svg>") no-repeat right 10px center/16px 16px; }
        /* 美化对话框 */
        #dialog-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.28);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .mx-dialog {
            min-width: 340px;
            max-width: 440px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(32,50,80,0.25), 0 1.5px 2px #e2eaf3;
            padding: 0 0 18px 0;
            overflow: hidden;
            position: relative;
            animation: dialog-fade-in 0.18s;
        }
        @keyframes dialog-fade-in {
            from { transform: translateY(60px) scale(1.04); opacity: 0;}
            to   { transform: none; opacity: 1;}
        }
        .mx-dialog-title {
            background: #f4f6fb;
            font-weight: bold;
            font-size: 16.5px;
            padding: 18px 20px 12px 26px;
            border-bottom: 1px solid #eef0f5;
            letter-spacing: 0.5px;
        }
        .mx-dialog-content {
            padding: 18px 24px 8px 26px;
            font-size: 15px;
            color: #343a40;
        }
        .mx-dialog-actions {
            text-align: right;
            padding: 0 22px;
            margin-top: 14px;
        }
        .mx-close {
            position: absolute;
            right:16px;
            top:10px;
            font-size:22px;
            color:#b3b2bd;
            background:none;
            border:none;
            width:32px;
            height:32px;
            cursor:pointer;
            line-height:1.5;
            transition:color .18s;
        }
        .mx-close:hover { color: #2076d3; }
    </style>
</head>
<body>
<div class="section">
    <div class="section-title">1. 按钮 Button</div>
    <button type="button" class="mx-button mx-primary" onclick="openDialog()">保存</button>
    <button type="button" class="mx-button mx-secondary">取消</button>
</div>

<div class="section">
    <div class="section-title">2. 对话框 Dialog</div>
    <!-- 点击保存按钮显示对话框 -->
    <button class="mx-button mx-primary" onclick="openDialog()">弹出对话框</button>
    <div id="dialog-bg">
        <div class="mx-dialog">
            <div class="mx-dialog-title">
                操作确认
                <button class="mx-close" onclick="closeDialog()" title="关闭">&#10005;</button>
            </div>
            <div class="mx-dialog-content">
                是否确认保存本次修改？
            </div>
            <div class="mx-dialog-actions">
                <button class="mx-button mx-primary" onclick="closeDialog()">确定</button>
                <button class="mx-button mx-secondary" onclick="closeDialog()">取消</button>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-title">3. 单选框 Radio Button</div>
    <label class="mx-radio">
        <input type="radio" name="asset_status" value="active" checked>
        启用
    </label>
    <label class="mx-radio">
        <input type="radio" name="asset_status" value="inactive">
        停用
    </label>
</div>
<div class="section">
    <div class="section-title">4. 表格 Table</div>
    <table class="mx-table">
        <thead>
        <tr>
            <th>资产编号</th>
            <th>资产名称</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1001</td>
            <td>锅炉泵</td>
            <td>启用</td>
            <td>
                <button class="mx-button mx-secondary">编辑</button>
            </td>
        </tr>
        <tr>
            <td>1002</td>
            <td>空调机组</td>
            <td>停用</td>
            <td>
                <button class="mx-button mx-secondary">编辑</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div class="section">
    <div class="section-title">5. 单行文本框</div>
    <label class="mx-label" for="assetnum">资产编号</label>
    <input class="mx-input" id="assetnum" type="text" placeholder="请输入资产编号"><br>
</div>
<div class="section">
    <div class="section-title">6. 多行文本框</div>
    <label class="mx-label" for="description">资产描述</label>
    <textarea class="mx-textarea" id="description" placeholder="请输入详细描述"></textarea>
</div>
<div class="section">
    <div class="section-title">7. 多部分文本框 (如区间字段)</div>
    <label class="mx-label">温度范围</label>
    <div class="mx-partinput">
        <input class="mx-input" type="text" placeholder="最低温度">
        <span>~</span>
        <input class="mx-input" type="text" placeholder="最高温度">
        <span>°C</span>
    </div>
</div>
<div class="section">
    <div class="section-title">8. 组合框（下拉选择 ComboBox）</div>
    <label class="mx-label" for="location">资产位置</label>
    <select class="mx-select" id="location">
        <option value="">请选择位置</option>
        <option value="warehouse">仓库</option>
        <option value="plant">工厂</option>
        <option value="office">办公区</option>
    </select>
</div>
<div class="section">
    <div class="section-title">9. 选项卡组（Tab Group）</div>
    <div class="mx-tabs">
        <div class="mx-tab active" onclick="showTab(0)">资产信息</div>
        <div class="mx-tab" onclick="showTab(1)">维修信息</div>
        <div class="mx-tab" onclick="showTab(2)">历史记录</div>
    </div>
    <div id="tab-contents">
        <div class="mx-tab-content" style="display:block;">
            这里显示资产信息内容。
        </div>
        <div class="mx-tab-content" style="display:none;">
            这里显示维修信息内容。
        </div>
        <div class="mx-tab-content" style="display:none;">
            这里显示历史记录内容。
        </div>
    </div>
</div>
<script>
    function openDialog() {
        // 用flex实现遮罩和居中
        document.getElementById('dialog-bg').style.display = 'flex';
    }
    function closeDialog() {
        document.getElementById('dialog-bg').style.display = 'none';
    }
    // tabs 切换脚本
    function showTab(idx) {
        var tabs = document.querySelectorAll('.mx-tab');
        var conts = document.querySelectorAll('.mx-tab-content');
        tabs.forEach((tab,i)=>tab.classList.toggle('active',i===idx));
        conts.forEach((c,i)=>c.style.display=i===idx?'block':'none');
    }
</script>
</body>
</html>
