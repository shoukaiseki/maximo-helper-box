<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商评价模板详情 - SC SET</title>
    <style>
        /* IBM Plex Sans 字体 */
        @font-face {
            font-family: 'MaximoBase';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Regular.woff") format("woff");
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'MaximoBase-Bold';
            src: url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff2") format("woff2"),
                 url("isuzu-ui/mas8/font/Sans/IBMPlexSans-Bold.woff") format("woff");
            font-weight: 600;
            font-style: normal;
        }

        body {
            font-family: 'MaximoBase', "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: #f1f1f1;
            margin: 0;
            padding: 20px;
            color: #161616;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-size: 20px;
            color: #161616;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #0F62FE;
        }

        .section-title {
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0 12px 0;
            color: #161616;
            padding-bottom: 8px;
            border-bottom: 1px solid #E0E0E0;
        }

        /* 主表信息样式 */
        .info-section {
            background: #FAFAFA;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #E0E0E0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .info-item {
            display: flex;
            align-items: center;
        }

        .mx-label {
            font-weight: 600;
            color: #464646;
            font-size: 13px;
            width: 100px;
            flex-shrink: 0;
            text-align: right;
            margin-right: 10px;
        }

        .mx-input, .mx-select {
            border: 0px;
            border-bottom: 1px solid #8D8D8D;
            border-radius: 0px;
            padding: 8px 12px;
            font-size: 14px;
            color: #000000;
            background-color: #ffffff;
            font-family: 'MaximoBase', Arial, sans-serif;
            width: 100%;
        }

        .mx-input:focus, .mx-select:focus {
            border-bottom-color: #0F62FE;
            outline: 2px solid #0F62FE;
            outline-offset: -2px;
        }

        .mx-input:read-only, .mx-select:disabled {
            background-color: #F4F4F4;
            color: #666666;
            cursor: not-allowed;
        }

        .required::before {
            content: "*";
            color: #DA1E28;
            margin-right: 4px;
        }

        /* 表格样式 */
        .mx-table {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            margin-top: 12px;
        }

        .mx-table th, .mx-table td {
            text-align: left;
            border: 0px;
            border-bottom: 1px solid #E0E0E0;
            padding: 10px 12px;
            font-size: 13px;
        }

        .mx-table th {
            background: #E0E0E0;
            font-family: 'MaximoBase-Bold', Arial, sans-serif;
            font-weight: bold;
            color: #444444;
            font-size: 13px;
            white-space: nowrap;
        }

        .mx-table tr:nth-child(even) {
            background-color: #FAFAFA;
        }

        .mx-table tr:nth-child(odd) {
            background-color: #ffffff;
        }

        .mx-table tr:hover {
            background: #f4f4f4;
        }

        td[numeric] {
            text-align: center;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .mx-table th, .mx-table td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>供应商评价模板详情</h1>

        <!-- 主表信息 -->
        <div class="section-title">模板基本信息</div>
        <div class="info-section">
            <div class="info-grid">
                <div class="info-item">
                    <label class="mx-label required" for="templateName">模板名称</label>
                    <input class="mx-input" id="templateName" type="text" placeholder="请输入模板名称" value="供应商评价模板">
                </div>
                <div class="info-item">
                    <label class="mx-label required" for="supplierType">供应商类型</label>
                    <input class="mx-input" id="supplierType" type="text" placeholder="请输入供应商类型" value="零件/物流/服务">
                </div>
                <div class="info-item">
                    <label class="mx-label" for="status">状态</label>
                    <input class="mx-input" id="status" type="text" value="草稿" readonly>
                </div>
                <div class="info-item">
                    <label class="mx-label required" for="totalScore">总分</label>
                    <input class="mx-input" id="totalScore" type="number" placeholder="请输入总分" value="100">
                </div>
                <div class="info-item">
                    <label class="mx-label required" for="passScore">合格分</label>
                    <input class="mx-input" id="passScore" type="number" placeholder="请输入合格分" value="80">
                </div>
                <div class="info-item">
                    <label class="mx-label" for="version">版本号</label>
                    <input class="mx-input" id="version" type="text" value="V1.0" readonly>
                </div>
                <div class="info-item">
                    <label class="mx-label required" for="evaluationRule">评价细则</label>
                    <input class="mx-input" id="evaluationRule" type="text" placeholder="请输入评价细则" value="细则.pdf">
                </div>
                <div class="info-item">
                    <label class="mx-label required" for="effectiveDate">生效日期</label>
                    <input class="mx-input" id="effectiveDate" type="date" value="2026-04-01">
                </div>
                <div class="info-item">
                    <label class="mx-label" for="createDate">创建日期</label>
                    <input class="mx-input" id="createDate" type="text" value="2026-03-20" readonly>
                </div>
                <div class="info-item">
                    <label class="mx-label" for="templateCode">模板编号</label>
                    <input class="mx-input" id="templateCode" type="text" value="SQA-001" readonly>
                </div>
                <div class="info-item">
                    <label class="mx-label" for="creator">创建人</label>
                    <input class="mx-input" id="creator" type="text" value="Admin" readonly>
                </div>
            </div>
        </div>

        <!-- 评价项子表 -->
        <div class="section-title">评价项目明细</div>
        <table class="mx-table">
            <thead>
                <tr>
                    <th>项目编号</th>
                    <th>类别</th>
                    <th>评价项目</th>
                    <th>打分方式</th>
                    <th>分值区间</th>
                    <th>最低合格分</th>
                    <th>是否必评</th>
                    <th>附件要求</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>SQA-I-001</td>
                    <td>品質保証組織</td>
                    <td>組織・責任・権限</td>
                    <td>固定分值</td>
                    <td numeric>1~5</td>
                    <td numeric>2</td>
                    <td numeric>是</td>
                    <td>必传</td>
                </tr>
                <tr>
                    <td>SQA-I-002</td>
                    <td>品質保証組織</td>
                    <td>品質会議体</td>
                    <td>固定分值</td>
                    <td numeric>1~5</td>
                    <td numeric>2</td>
                    <td numeric>是</td>
                    <td>选传</td>
                </tr>
                <tr>
                    <td>SQA-I-003</td>
                    <td>体系図</td>
                    <td>開発～サービス段階の各ステップでの実施項目</td>
                    <td>固定分值</td>
                    <td numeric>1~5</td>
                    <td numeric>2</td>
                    <td numeric>否</td>
                    <td>选传</td>
                </tr>
                <tr>
                    <td>SQA-I-004</td>
                    <td>品質標準類</td>
                    <td>必要な標準類が揃っている</td>
                    <td>手工录入</td>
                    <td numeric>0~2.5</td>
                    <td numeric>0</td>
                    <td numeric>是</td>
                    <td>选传</td>
                </tr>
                <tr>
                    <td>...</td>
                    <td>...</td>
                    <td>...</td>
                    <td>...</td>
                    <td numeric>...</td>
                    <td numeric>...</td>
                    <td numeric>...</td>
                    <td>...</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
