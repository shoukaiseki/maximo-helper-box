<!DOCTYPE html>
<html>
<head>
    <title>生成图标</title>
</head>
<body>
    <h2>请右键保存以下图标：</h2>
    
    <h3>16x16 图标：</h3>
    <canvas id="canvas16" width="16" height="16"></canvas>
    
    <h3>48x48 图标：</h3>
    <canvas id="canvas48" width="48" height="48"></canvas>
    
    <h3>128x128 图标：</h3>
    <canvas id="canvas128" width="128" height="128"></canvas>
    
    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // 背景
            ctx.fillStyle = '#007cba';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.125);
            ctx.fill();
            
            // 绘制复选框
            const boxSize = size * 0.25;
            const spacing = size * 0.15;
            const startX = size * 0.15;
            
            for (let i = 0; i < 3; i++) {
                const y = spacing + i * (boxSize + spacing * 0.5);
                
                // 复选框边框
                ctx.strokeStyle = 'white';
                ctx.lineWidth = size * 0.02;
                ctx.strokeRect(startX, y, boxSize, boxSize);
                
                // 勾选标记
                ctx.beginPath();
                ctx.moveTo(startX + boxSize * 0.2, y + boxSize * 0.5);
                ctx.lineTo(startX + boxSize * 0.4, y + boxSize * 0.7);
                ctx.lineTo(startX + boxSize * 0.8, y + boxSize * 0.3);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = size * 0.025;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
        }
        
        drawIcon(document.getElementById('canvas16'), 16);
        drawIcon(document.getElementById('canvas48'), 48);
        drawIcon(document.getElementById('canvas128'), 128);
    </script>
</body>
</html>
