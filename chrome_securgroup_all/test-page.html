<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .checkbox-group {
            margin: 10px 0;
        }
        input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }
        label {
            font-size: 16px;
            cursor: pointer;
        }
        .cds--checkbox {
            /* 模拟 CDS 复选框样式 */
        }
        h1 {
            color: #333;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007cba;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background: #005a87;
        }
    </style>
</head>
<body>
    <h1>🧪 Chrome 插件测试页面</h1>
    
    <div class="info">
        <h3>📋 使用说明：</h3>
        <ol>
            <li>按 F12 打开控制台</li>
            <li>查看是否有 "[Checkbox Helper] 内容脚本已加载" 的日志</li>
            <li>点击插件图标，尝试使用"全选"功能</li>
            <li>观察复选框是否被勾选</li>
        </ol>
    </div>

    <div class="test-section">
        <h2>测试1：CDS 复选框（cds--checkbox）</h2>
        <div class="checkbox-group">
            <input type="checkbox" class="cds--checkbox" id="cds1">
            <label for="cds1">选项 1</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" class="cds--checkbox" id="cds2">
            <label for="cds2">选项 2</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" class="cds--checkbox" id="cds3">
            <label for="cds3">选项 3</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" class="cds--checkbox" id="cds4">
            <label for="cds4">选项 4</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" class="cds--checkbox" id="cds5">
            <label for="cds5">选项 5</label>
        </div>
    </div>

    <div class="test-section">
        <h2>测试2：普通复选框</h2>
        <div class="checkbox-group">
            <input type="checkbox" id="normal1">
            <label for="normal1">普通选项 1</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="normal2">
            <label for="normal2">普通选项 2</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="normal3">
            <label for="normal3">普通选项 3</label>
        </div>
    </div>

    <div class="test-section">
        <h2>手动测试按钮</h2>
        <button onclick="testCheckboxes()">测试：勾选所有CDS复选框</button>
        <button onclick="clearAll()">清空所有选择</button>
        <button onclick="showInfo()">显示复选框信息</button>
    </div>

    <script>
        // 页面加载时输出信息
        console.log('===== 测试页面已加载 =====');
        console.log('CDS复选框数量:', document.querySelectorAll('.cds--checkbox').length);
        console.log('所有复选框数量:', document.querySelectorAll('input[type="checkbox"]').length);

        function testCheckboxes() {
            console.log('\n===== 开始手动测试 =====');
            const checkboxes = document.querySelectorAll('.cds--checkbox');
            console.log('找到', checkboxes.length, '个CDS复选框');
            
            checkboxes.forEach((cb, i) => {
                if (!cb.checked) {
                    // 使用原生 setter
                    const setter = Object.getOwnPropertyDescriptor(
                        window.HTMLInputElement.prototype, 
                        'checked'
                    ).set;
                    setter.call(cb, true);
                    
                    // 触发事件
                    cb.dispatchEvent(new Event('change', { bubbles: true }));
                    console.log(`✓ 复选框 ${i + 1} (${cb.id}) 已勾选`);
                }
            });
            
            console.log('===== 测试完成 =====\n');
        }

        function clearAll() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = false;
            });
            console.log('已清空所有复选框');
        }

        function showInfo() {
            console.log('\n===== 复选框信息 =====');
            const cdsCheckboxes = document.querySelectorAll('.cds--checkbox');
            const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
            
            console.log('CDS复选框:', cdsCheckboxes.length);
            console.log('所有复选框:', allCheckboxes.length);
            
            cdsCheckboxes.forEach((cb, i) => {
                console.log(`CDS ${i + 1}:`, {
                    id: cb.id,
                    checked: cb.checked,
                    className: cb.className
                });
            });
            console.log('===================\n');
        }
    </script>
</body>
</html>
